<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ś§úśüĽśļĖŚāôÁČ©Ť°®">

<title>ś§úśüĽśļĖŚāôÁČ©Ť°®</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN','Meiryo',sans-serif;background:#f5f5f3;color:#1a1a1a;font-size:14px;}

/* ===== STATUS BAR ===== */
.status-bar{padding:4px 20px;font-size:11px;text-align:right;color:#999;background:#fff;border-bottom:1px solid #f0ede8;}
.status-bar .online{color:#1d7a4f;}
.status-bar .offline{color:#d93025;}
.status-bar .syncing{color:#e37400;}

/* ===== HEADER ===== */
.header{background:#fff;border-bottom:1px solid #e8e6e0;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:100;}
.header h1{font-size:18px;font-weight:600;color:#1a1a1a;}
.header-right{display:flex;align-items:center;gap:10px;}
.toast{font-size:12px;color:#1d7a4f;display:none;background:#e8f5ee;padding:4px 10px;border-radius:6px;}
.btn-add{font-size:13px;padding:7px 16px;border:none;border-radius:8px;background:#1a73e8;color:#fff;cursor:pointer;font-weight:500;}
.btn-add:hover{background:#1557b0;}
.search-bar{padding:12px 20px;background:#fff;border-bottom:1px solid #e8e6e0;}
.search-bar input{width:100%;max-width:400px;padding:8px 14px;font-size:14px;border:1px solid #ddd;border-radius:8px;background:#f9f9f7;color:#1a1a1a;outline:none;}
.search-bar input:focus{border-color:#1a73e8;background:#fff;}

/* ===== LOADING ===== */
.loading-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,0.9);display:flex;align-items:center;justify-content:center;z-index:200;flex-direction:column;gap:12px;}
.loading-overlay.hidden{display:none;}
.spinner{width:36px;height:36px;border:3px solid #e0e0e0;border-top-color:#1a73e8;border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:14px;color:#666;}

/* ===== ERROR BANNER ===== */
.error-banner{padding:10px 20px;background:#fce8e6;color:#d93025;font-size:13px;display:none;align-items:center;gap:8px;}
.error-banner.show{display:flex;}
.error-banner button{font-size:12px;padding:4px 12px;border:1px solid #d93025;border-radius:6px;background:#fff;color:#d93025;cursor:pointer;margin-left:auto;}

/* ===== PC TABLE ===== */
.pc-view{display:none;}
.tbl-wrap{padding:16px 20px;overflow-x:auto;}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;border:1px solid #e8e6e0;}
thead tr{background:#f9f9f7;}
th{padding:10px 16px;font-size:11px;font-weight:600;color:#666;letter-spacing:0.5px;text-transform:uppercase;border-bottom:1px solid #e8e6e0;border-right:1px solid #e8e6e0;text-align:left;}
th:last-child{border-right:none;}
td{padding:12px 14px;font-size:13px;color:#1a1a1a;border-bottom:1px solid #f0ede8;border-right:1px solid #f0ede8;vertical-align:top;line-height:1.75;}
td:last-child{border-right:none;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:not(.editing):hover td{background:#fafaf8;}
tbody tr.editing td{background:#f0f4ff;padding:10px 12px;}
.col-name{width:140px;}.col-memo{width:35%;}.col-links{width:25%;}.col-other{width:17%;}.col-act{width:56px;text-align:center;}
.name-cell{font-weight:600;color:#1a1a1a;}
.memo-cell{white-space:pre-line;color:#333;}
.empty{color:#aaa;font-size:12px;font-style:italic;}
.link-pill{display:inline-flex;padding:3px 11px;font-size:12px;color:#1a73e8;background:#e8f0fe;border-radius:20px;border:none;text-decoration:none;margin:2px 3px 2px 0;font-weight:500;}
.link-pill:hover{background:#d2e3fc;}
.link-pill.dim{opacity:0.45;cursor:default;}
.edit-btn{font-size:12px;padding:4px 12px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#555;cursor:pointer;font-weight:500;}
.edit-btn:hover{background:#e8f0fe;color:#1a73e8;border-color:#1a73e8;}

/* PC „ā§„É≥„É©„ā§„É≥Á∑®ťõÜ */
.cell-input{width:100%;font-size:13px;padding:6px 9px;border:1px solid #c5c5c5;border-radius:6px;background:#fff;color:#1a1a1a;font-family:inherit;outline:none;}
.cell-input:focus{border-color:#1a73e8;}
.cell-textarea{width:100%;font-size:13px;padding:7px 9px;border:1px solid #c5c5c5;border-radius:6px;background:#fff;color:#1a1a1a;font-family:inherit;resize:vertical;min-height:88px;line-height:1.75;outline:none;}
.cell-textarea:focus{border-color:#1a73e8;}
.cell-other{min-height:60px;}
.lr{display:flex;flex-direction:column;gap:4px;margin-bottom:5px;}
.lr-row{display:flex;gap:4px;align-items:center;}
.lr-row input{flex:1;min-width:0;font-size:12px;padding:5px 8px;border:1px solid #c5c5c5;border-radius:6px;background:#fff;color:#1a1a1a;font-family:inherit;outline:none;}
.lr-row input:focus{border-color:#1a73e8;}
.lr-del{font-size:12px;padding:4px 7px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#999;cursor:pointer;flex-shrink:0;}
.lr-del:hover{color:#d93025;border-color:#d93025;}
.add-lr{font-size:12px;color:#1a73e8;background:none;border:none;cursor:pointer;padding:2px 0;display:block;margin-top:2px;font-weight:500;}
.act-btns{display:flex;flex-direction:column;gap:5px;align-items:stretch;}
.save-btn{font-size:12px;padding:5px 10px;border:none;border-radius:6px;background:#1a73e8;color:#fff;cursor:pointer;font-weight:500;}
.save-btn:hover{background:#1557b0;}
.cancel-btn{font-size:12px;padding:5px 10px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#555;cursor:pointer;}
.del-btn-s{font-size:11px;padding:4px 8px;border:1px solid #f5c6c6;border-radius:6px;background:#fff;color:#d93025;cursor:pointer;margin-top:2px;}

/* ===== MOBILE CARDS ===== */
.mob-view{display:block;}
.mob-list{padding:12px 14px;display:flex;flex-direction:column;gap:8px;}
.card{background:#fff;border:1px solid #e8e6e0;border-radius:12px;overflow:hidden;}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;gap:8px;user-select:none;}
.card-head:hover{background:#fafaf8;}
.card-name{font-size:15px;font-weight:600;color:#1a1a1a;flex:1;}
.head-r{display:flex;align-items:center;gap:8px;}
.lc-badge{font-size:11px;padding:2px 9px;border-radius:20px;background:#e8f0fe;color:#1a73e8;font-weight:500;}
.chev{font-size:12px;color:#999;transition:transform 0.2s;}
.chev.open{transform:rotate(180deg);}
.card-body{display:none;border-top:1px solid #f0ede8;}
.card-body.open{display:block;}
.sec{padding:13px 16px;border-bottom:1px solid #f0ede8;}
.sec:last-child{border-bottom:none;}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.sec-label{font-size:11px;font-weight:600;color:#888;letter-spacing:0.5px;text-transform:uppercase;}
.mob-edit-btn{font-size:11px;padding:3px 11px;border:1px solid #ddd;border-radius:20px;background:#fff;color:#555;cursor:pointer;font-weight:500;}
.mob-edit-btn:hover{background:#e8f0fe;color:#1a73e8;border-color:#1a73e8;}
.mob-edit-btn.active{background:#e8f0fe;color:#1a73e8;border-color:#1a73e8;}
.memo-view{font-size:14px;color:#333;line-height:1.8;white-space:pre-line;}
.memo-empty{font-size:13px;color:#aaa;font-style:italic;}
.mob-textarea{width:100%;font-size:14px;padding:8px 10px;border:1px solid #c5c5c5;border-radius:8px;background:#fff;resize:vertical;font-family:inherit;min-height:80px;color:#1a1a1a;line-height:1.8;outline:none;}
.mob-textarea:focus{border-color:#1a73e8;}
.mob-save-btn{margin-top:8px;font-size:13px;padding:6px 16px;border:none;border-radius:8px;background:#1a73e8;color:#fff;cursor:pointer;font-weight:500;display:block;}
.link-pills{display:flex;flex-wrap:wrap;gap:6px;}
.mob-lr{display:flex;flex-direction:column;gap:5px;margin-bottom:6px;}
.mob-lr-row{display:flex;gap:5px;align-items:center;}
.mob-lr-row input{flex:1;min-width:0;font-size:13px;padding:6px 9px;border:1px solid #c5c5c5;border-radius:8px;background:#fff;color:#1a1a1a;font-family:inherit;outline:none;}
.mob-lr-row input:focus{border-color:#1a73e8;}
.mob-lr-del{font-size:12px;padding:5px 9px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#999;cursor:pointer;flex-shrink:0;}
.mob-lr-del:hover{color:#d93025;border-color:#d93025;}
.mob-add-lr{font-size:12px;color:#1a73e8;background:none;border:none;cursor:pointer;padding:2px 0;margin-top:3px;display:block;font-weight:500;}
.other-view{font-size:14px;color:#333;line-height:1.8;white-space:pre-line;word-break:break-all;}
.card-footer{padding:10px 16px;display:flex;justify-content:flex-end;}
.del-card-btn{font-size:12px;padding:5px 14px;border:1px solid #f5c6c6;border-radius:8px;background:#fff;color:#d93025;cursor:pointer;}

/* ===== RESPONSIVE ===== */
@media(min-width:768px){
  .pc-view{display:block;}
  .mob-view{display:none;}
}
</style>
</head>
<body>

<!-- Loading -->
<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-text">„Éá„Éľ„āŅ„āíŤ™≠„ĀŅŤĺľ„ĀŅšł≠...</div>
</div>

<!-- Status Bar -->
<div class="status-bar" id="statusBar">
  <span class="online" id="statusOnline">śé•Á∂öšł≠</span>
  <span class="offline" id="statusOffline" style="display:none;">„ā™„Éē„É©„ā§„É≥Ôľą„É≠„Éľ„āę„Éę„Éá„Éľ„āŅÔľČ</span>
  <span class="syncing" id="statusSyncing" style="display:none;">ŚźĆśúüšł≠...</span>
</div>

<!-- Error Banner -->
<div class="error-banner" id="errorBanner">
  <span id="errorMsg"></span>
  <button onclick="hideError()">ťĖČ„Āė„āč</button>
</div>

<!-- Header -->
<div class="header">
  <h1>ś§úśüĽśļĖŚāôÁČ©Ť°®</h1>
  <div class="header-right">
    <span class="toast" id="toast">šŅĚŚ≠ė„Āó„Āĺ„Āó„Āü</span>
    <button class="btn-add" onclick="addCard()">Ôľč ś§úśüĽ„āíŤŅĹŚä†</button>
  </div>
</div>
<div class="search-bar">
  <input type="text" placeholder="ś§úśüĽŚźć„Āßś§úÁīĘ..." oninput="filterAll(this.value)">
</div>

<!-- PC TABLE -->
<div class="pc-view">
  <div class="tbl-wrap">
    <table>
      <thead><tr>
        <th class="col-name">ś§úśüĽŚźć</th>
        <th class="col-memo">śĆĀ„Ā°ÁČ©„ÉĽśļĖŚāôÁČ©</th>
        <th class="col-links">ťĖĘťÄ£„É™„É≥„āĮ</th>
        <th class="col-other">„ĀĚ„ĀģšĽĖ</th>
        <th class="col-act"></th>
      </tr></thead>
      <tbody id="pc-body"></tbody>
    </table>
  </div>
</div>

<!-- MOBILE CARDS -->
<div class="mob-view">
  <div class="mob-list" id="mob-list"></div>
</div>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<!-- Config -->
<script src="config.js"></script>

<script>
// =============================================
// „āį„É≠„Éľ„Éź„ÉęŚ§Čśēį
// =============================================
var data = [];
var pcEditing = -1;
var openCards = {};
var editSec = {};
var supabase = null;
var isOnline = navigator.onLine;
var useSupabase = false;

// =============================================
// ŚąĚśúüŚĆĖ
// =============================================
async function init() {
  // Supabaseśé•Á∂ö„āíŤ©¶„ĀŅ„āč
  if (typeof SUPABASE_URL !== 'undefined' && SUPABASE_URL !== 'YOUR_SUPABASE_URL') {
    try {
      supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      useSupabase = true;
    } catch (e) {
      console.warn('Supabaseśé•Á∂öŚ§Īśēó„ÄĀ„É≠„Éľ„āę„Éę„ÉĘ„Éľ„ÉČ„ĀßŤĶ∑Śčē:', e);
    }
  }

  // „Éá„Éľ„āŅŤ™≠„ĀŅŤĺľ„ĀŅ
  if (useSupabase && isOnline) {
    try {
      await loadFromSupabase();
    } catch (e) {
      console.warn('SupabaseŤ™≠„ĀŅŤĺľ„ĀŅŚ§Īśēó:', e);
      loadFromLocal();
    }
  } else {
    loadFromLocal();
  }

  hideLoading();
  renderPC();
  renderMob();
  updateStatus();

  // Supabase„É™„āĘ„Éę„āŅ„ā§„É†Ť≥ľŤ™≠
  if (useSupabase) {
    subscribeRealtime();
  }
}

// =============================================
// „Éá„Éľ„āŅŤ™≠„ĀŅŤĺľ„ĀŅ
// =============================================
async function loadFromSupabase() {
  var res = await supabase.from('inspections').select('*').order('sort_order', { ascending: true });
  if (res.error) throw res.error;
  data = res.data.map(function(row) {
    return {
      id: row.id,
      name: row.name || '',
      memo: row.memo || '',
      links: (typeof row.links === 'string' ? JSON.parse(row.links) : row.links) || [],
      other: row.other || '',
      sort_order: row.sort_order
    };
  });
  // „É≠„Éľ„āę„Éę„Āę„āā„ā≠„É£„ÉÉ„ā∑„É•
  saveToLocal();
  setStatus('online');
}

function loadFromLocal() {
  try {
    var s = localStorage.getItem('insp_pwa');
    if (s) {
      data = JSON.parse(s);
    } else {
      data = getDefaultData();
    }
  } catch (e) {
    data = getDefaultData();
  }
  if (!isOnline) setStatus('offline');
}

function saveToLocal() {
  try {
    localStorage.setItem('insp_pwa', JSON.stringify(data));
  } catch (e) {}
}

// =============================================
// Supabase CRUD
// =============================================
async function saveItem(index) {
  var item = data[index];
  saveToLocal();
  showToast();

  if (!useSupabase || !isOnline) return;
  setStatus('syncing');

  try {
    if (item.id) {
      // śõīśĖį
      var res = await supabase.from('inspections').update({
        name: item.name,
        memo: item.memo,
        links: item.links,
        other: item.other,
        sort_order: item.sort_order !== undefined ? item.sort_order : index
      }).eq('id', item.id);
      if (res.error) throw res.error;
    } else {
      // śĖįŤ¶Ź
      var res = await supabase.from('inspections').insert({
        name: item.name,
        memo: item.memo,
        links: item.links,
        other: item.other,
        sort_order: data.length - 1
      }).select();
      if (res.error) throw res.error;
      if (res.data && res.data[0]) {
        data[index].id = res.data[0].id;
        data[index].sort_order = res.data[0].sort_order;
        saveToLocal();
      }
    }
    setStatus('online');
  } catch (e) {
    console.error('šŅĚŚ≠ė„ā®„É©„Éľ:', e);
    showError('šŅĚŚ≠ė„ĀęŚ§Īśēó„Āó„Āĺ„Āó„Āü„ÄāŚĺĆ„ĀßŚÜćŤ©¶Ť°Ć„Āó„Āĺ„Āô„Äā');
    setStatus('offline');
  }
}

async function deleteItem(index) {
  var item = data[index];
  data.splice(index, 1);
  saveToLocal();
  showToast();

  if (!useSupabase || !isOnline || !item.id) return;
  setStatus('syncing');

  try {
    var res = await supabase.from('inspections').delete().eq('id', item.id);
    if (res.error) throw res.error;
    setStatus('online');
  } catch (e) {
    console.error('ŚČäťô§„ā®„É©„Éľ:', e);
    showError('„āĶ„Éľ„Éź„Éľ„Āč„āČ„ĀģŚČäťô§„ĀęŚ§Īśēó„Āó„Āĺ„Āó„Āü„Äā');
    setStatus('offline');
  }
}

// =============================================
// „É™„āĘ„Éę„āŅ„ā§„É†ŚźĆśúü
// =============================================
function subscribeRealtime() {
  if (!supabase) return;
  supabase.channel('inspections-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'inspections' }, function(payload) {
      // šĽĖ„ĀģÁęĮśúę„Āč„āČ„ĀģŚ§Čśõī„āíŚŹćśė†
      loadFromSupabase().then(function() {
        renderPC();
        renderMob();
      }).catch(function() {});
    })
    .subscribe();
}

// =============================================
// UI „āĻ„ÉÜ„Éľ„āŅ„āĻ
// =============================================
function setStatus(s) {
  document.getElementById('statusOnline').style.display = s === 'online' ? '' : 'none';
  document.getElementById('statusOffline').style.display = s === 'offline' ? '' : 'none';
  document.getElementById('statusSyncing').style.display = s === 'syncing' ? '' : 'none';
}

function updateStatus() {
  if (!useSupabase) {
    document.getElementById('statusBar').style.display = 'none';
    return;
  }
  setStatus(isOnline ? 'online' : 'offline');
}

function hideLoading() {
  document.getElementById('loading').classList.add('hidden');
}

function showToast() {
  var t = document.getElementById('toast');
  t.style.display = 'inline';
  setTimeout(function() { t.style.display = 'none'; }, 2000);
}

function showError(msg) {
  document.getElementById('errorMsg').textContent = msg;
  document.getElementById('errorBanner').classList.add('show');
}

function hideError() {
  document.getElementById('errorBanner').classList.remove('show');
}

// =============================================
// „ā™„É≥„É©„ā§„É≥/„ā™„Éē„É©„ā§„É≥ś§úÁü•
// =============================================
window.addEventListener('online', function() {
  isOnline = true;
  updateStatus();
  // „ā™„É≥„É©„ā§„É≥Śĺ©Śłįśôā„ĀęSupabase„Āč„āČ„Éá„Éľ„āŅŚÜćŤ™≠„ĀŅŤĺľ„ĀŅ
  if (useSupabase) {
    loadFromSupabase().then(function() {
      renderPC();
      renderMob();
    }).catch(function() {});
  }
});

window.addEventListener('offline', function() {
  isOnline = false;
  updateStatus();
});

// =============================================
// „Éė„Éę„ÉĎ„Éľ
// =============================================
function esc(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function lvHtml(item) {
  return item.links.map(function(l) {
    if (l.url) return '<a class="link-pill" href="' + esc(l.url) + '" target="_blank">' + esc(l.label || l.url) + '</a>';
    if (l.label) return '<span class="link-pill dim">' + esc(l.label) + '</span>';
    return '';
  }).join('');
}

// =============================================
// PC „ÉÜ„Éľ„ÉĖ„ÉęśŹŹÁĒĽ
// =============================================
function renderPC() {
  var tb = document.getElementById('pc-body');
  if (!tb) return;
  tb.innerHTML = '';
  data.forEach(function(item, i) {
    var tr = document.createElement('tr');
    tr.dataset.name = item.name.toLowerCase();
    if (pcEditing === i) {
      tr.className = 'editing';
      var lrHtml = (item.links.length ? item.links : [{ label: '', url: '' }]).map(function(l, li) {
        return '<div class="lr-row">'
          + '<input type="text" placeholder="„É©„Éô„ÉęŚźć" value="' + esc(l.label || '') + '" data-idx="' + i + '" data-li="' + li + '" data-field="label" onchange="updateLink(this)">'
          + '<input type="text" placeholder="URL" value="' + esc(l.url || '') + '" data-idx="' + i + '" data-li="' + li + '" data-field="url" onchange="updateLink(this)">'
          + '<button class="lr-del" onclick="pcRmLink(' + i + ',' + li + ')">‚úē</button>'
          + '</div>';
      }).join('');

      tr.innerHTML = '<td><input class="cell-input" type="text" value="' + esc(item.name) + '" data-idx="' + i + '" onchange="data[' + i + '].name=this.value"></td>'
        + '<td><textarea class="cell-textarea" data-idx="' + i + '" onchange="data[' + i + '].memo=this.value">' + esc(item.memo) + '</textarea></td>'
        + '<td><div class="lr">' + lrHtml + '</div><button class="add-lr" onclick="pcAddLink(' + i + ')">Ôľč „É™„É≥„āĮ„āíŤŅĹŚä†</button></td>'

function updateLink(el) {
  var i = parseInt(el.dataset.idx);
  var li = parseInt(el.dataset.li);

  if (!data[i].links[li]) data[i].links[li] = { label: '', url: '' };
  data[i].links[li][field] = el.value;
}

function pcStartEdit(i) { pcEditing = i; renderPC(); }
function pcCancel() { pcEditing = -1; loadFromLocal(); renderPC(); }

function pcAddLink(i) { data[i].links.push({ label: '', url: '' }); renderPC(); }
function pcRmLink(i, li) {
  data[i].links.splice(li, 1);

function k(i, s) { return i + '_' + s; }

function renderMob() {

  if (!list) return;
  list.innerHTML = '';

    var isOpen = !!openCards[i];
    var eMemo = editSec[k(i, 'memo')], eLink = editSec[k(i, 'link')], eOther = editSec[k(i, 'other')];
    var lc = item.links.filter(function(l) { return l.url; }).length + (item.other ? 1 : 0);
    var lh = lvHtml(item);
    var card = document.createElement('div');
    card.className = 'card';
    card.dataset.name = item.name.toLowerCase();
    var bodyHtml = '';
    if (isOpen) {
      // „É™„É≥„āĮÁ∑®ťõÜťÉ®ŚąÜ
      var lrInputs = (item.links.length ? item.links : [{ label: '', url: '' }]).map(function(l, li) {
        return '<div class="mob-lr-row">'

      bodyHtml = '<div class="card-body open">'
        + '<div class="sec"><div class="sec-head"><span class="sec-label">śĆĀ„Ā°ÁČ©„ÉĽśļĖŚāôÁČ©</span>'
        + '<button class="mob-edit-btn' + (eMemo ? ' active' : '') + '" onclick="mobToggleSec(' + i + ',\'memo\')">' + (eMemo ? 'ŚģĆšļÜ' : 'Á∑®ťõÜ„Āô„āč') + '</button></div>'
        + (eMemo ? '<textarea class="mob-textarea" onchange="data[' + i + '].memo=this.value">' + esc(item.memo) + '</textarea><button class="mob-save-btn" onclick="mobSaveSec(' + i + ',\'memo\')">šŅĚŚ≠ė</button>'

        + '<button class="mob-edit-btn' + (eLink ? ' active' : '') + '" onclick="mobToggleSec(' + i + ',\'link\')">' + (eLink ? 'ŚģĆšļÜ' : 'Á∑®ťõÜ„Āô„āč') + '</button></div>'
        + (eLink ? '<div class="mob-lr">' + lrInputs + '</div><button class="mob-add-lr" onclick="mobAddLink(' + i + ')">Ôľč „É™„É≥„āĮ„āíŤŅĹŚä†</button><button class="mob-save-btn" onclick="mobSaveSec(' + i + ',\'link\')">šŅĚŚ≠ė</button>'

        + '<div class="sec"><div class="sec-head"><span class="sec-label">„ĀĚ„ĀģšĽĖ</span>'

function mobToggleOpen(i) {
  openCards[i] = !openCards[i];
  if (!openCards[i]) { delete editSec[k(i, 'memo')]; delete editSec[k(i, 'link')]; delete editSec[k(i, 'other')]; }
  renderMob();
}
function mobToggleSec(i, s) { editSec[k(i, s)] = !editSec[k(i, s)]; renderMob(); }
function mobSaveSec(i, s) { delete editSec[k(i, s)]; saveItem(i); renderMob(); }
function mobAddLink(i) { data[i].links.push({ label: '', url: '' }); editSec[k(i, 'link')] = true; renderMob(); }
function mobRmLink(i, li) {
  data[i].links.splice(li, 1);
  if (!data[i].links.length) data[i].links = [{ label: '', url: '' }];
  editSec[k(i, 'link')] = true;
  renderMob();
}

function delCard(i) {
  if (!confirm('„ÄĆ' + data[i].name + '„Äć„āíŚČäťô§„Āó„Āĺ„Āô„ĀčÔľü')) return;
  var idx = i;
  pcEditing = -1;
  delete openCards[i];
  deleteItem(idx);
  renderPC();
  renderMob();
}

function addCard() {
  data.push({ name: 'śĖį„Āó„ĀĄś§úśüĽ', memo: '', links: [{ label: '', url: '' }], other: '', sort_order: data.length });
  var idx = data.length - 1;
  pcEditing = idx;
  openCards[idx] = true;
  editSec[k(idx, 'memo')] = true;
  saveItem(idx);
  renderPC();
  renderMob();
}

function filterAll(q) {
  var lq = q.toLowerCase();
  document.querySelectorAll('#pc-body tr').forEach(function(r) {
    r.style.display = (!q || (r.dataset.name && r.dataset.name.includes(lq))) ? '' : 'none';
  });
  document.querySelectorAll('#mob-list .card').forEach(function(c) {
    c.style.display = (!q || (c.dataset.name && c.dataset.name.includes(lq))) ? '' : 'none';
  });
}
